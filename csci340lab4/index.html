<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Two Wolves</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <section class="jumbotron">
            <div class="container">
                <div class="row text-center">
                    <h1>Inside each of us there are two wolves:</h1>
                </div>
            </div>
        </section>

        <div class="container">
            <div class="row gx-5">
                <div id="dog2" class="col-5 dog">
                    <p id="quote2" class="quote"></p>
                </div>
                <div class="col-2 note">
                    <h3>Note:</h3>
                    <p>Both wolves sound suspiciously like Kanye</p>
                </div>
                <div id="dog1" class="col-5 dog">
                    <p id="quote1" class="quote"></p>
                </div>
            </div>
            <div class="row gx-5">
                <div class="col-5">
                    <input type="button" id="left" value="New Left Wolf">
                </div>
                <div class="col-2">
                    <input type="button" id="both" value="New Wolves">
                </div>
                <div class="col-5">
                    <input type="button" id="right" value="New Right Wolf">
                </div>
            </div>
          </div>
        
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
        <script src="script.js"></script>
        
    </body>
</html>
